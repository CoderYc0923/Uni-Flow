site_name: Uni-Flow
site_description: Agent 统一编排引擎 —— 用记账路由故事讲清楚
site_url: https://CoderYc0923.github.io/Uni-Flow/
repo_url: https://github.com/CoderYc0923/Uni-Flow
repo_name: CoderYc0923/Uni-Flow
edit_uri: edit/main/docs-site/

docs_dir: docs-site
site_dir: site

theme:
  name: material
  language: zh
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 先懂它:
      - 它解决什么: understand/what-it-solves.md
      - 核心公式: understand/core-formula.md
      - 是不是空壳？: understand/empty-shell.md
  - 动手:
      - 最小可跑（Mock）: hands-on/mock-minimal.md
      - 记账路由怎么接: hands-on/accounting-router.md
      - 校验与 Agent 约定: hands-on/validate-agents.md
  - 深挖:
      - ControlFlow 何时用: dig-deeper/controlflow-when.md
      - Layer4 为何存在: dig-deeper/layer4-why.md
      - 统一模型附录: dig-deeper/design-appendix.md
  - 参考:
      - API 速查: reference/api.md
      - 示例目录: reference/examples.md
      - FAQ: reference/faq.md
      - 跨语言: reference/cross-lang.md
      - 远程 Unit 契约: reference/remote-unit.md
      - OpenSpec 与设计长文: reference/openspec-index.md
      - Agent 约定: reference/agents.md
      - GitHub Pages: ops/github-pages.md
      - 贡献: ops/contributing.md
